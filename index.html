<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Microsoft 365 Copilot – Příručka pro zaměstnance firmy</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Jednoduchá heslová brána (není to skutečná bezpečnost, jen zábrana před náhodnými návštěvníky).
    (function(){
      // "humpolec" zakódované v base64, ať není heslo přímo v HTML zdrojáku.
      var EXPECTED = "aHVtcG9sZWM=";
      if (sessionStorage.getItem("eon_pw_ok") === "1") return;
      var tries = 0;
      while (tries < 3){
        var input = prompt("Zadej heslo pro přístup k příručce:");
        if (input === null){ document.documentElement.innerHTML = ""; document.write("Přístup odepřen."); return; }
        if (btoa(input) === EXPECTED){
          sessionStorage.setItem("eon_pw_ok", "1");
          return;
        }
        tries++;
      }
      document.documentElement.innerHTML = "";
      document.write("Přístup odepřen.");
    })();
  </script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-title">Microsoft 365 Copilot</div>
        <div class="brand-sub">Příručka pro zaměstnance firmy</div>
      </div>

      <div class="search">
        <input id="searchInput" type="search" placeholder="Hledat v kapitolách…" autocomplete="off" />
      </div>

      <nav id="nav" class="nav" aria-label="Kapitoly"></nav>

      <div class="sidebar-footer">
        <div class="tiny">Tip: otevři kapitolu, zkopíruj prompt, doplň [ ] a spusť.</div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button id="menuToggle" class="menu-toggle" title="Zobrazit menu">Menu</button>
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <div class="actions">
          <button id="prevBtn" class="btn" title="Předchozí kapitola">←</button>
          <button id="nextBtn" class="btn" title="Další kapitola">→</button>
          <button id="copyLinkBtn" class="btn" title="Zkopírovat odkaz na kapitolu">Kopírovat odkaz</button>
          <button id="printBtn" class="btn" title="Tisk aktuální kapitoly">Tisk kapitoly</button>
        </div>
      </header>

      <article id="article" class="article" aria-live="polite"></article>

      <footer class="footer">
        <div class="tiny">Interní studijní materiál pro workshop. Nepoužívej pro sdílení citlivých dat mimo firemní prostředí.</div>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
